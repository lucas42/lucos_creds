version: 2.1
orbs:
  lucos: lucos/deploy@0
jobs:
  test:
    docker:
      - image: cimg/go:1.25
    environment:
      GO111MODULE: auto
    working_directory: ~/repo/server
    steps:
      - checkout:
          path: ~/repo
      - run:
          name: Install Dependencies
          command: go get ./...
      - run:
          name: Unit Tests
          command: go test ./src -coverprofile=coverage.out
      - run:
          name: Generate Code Coverage
          command: go tool cover -html=coverage.out -o coverage.html
      - store_artifacts:
          path: coverage.html

workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - lucos/build-amd64
      # Self-deploy: LUCOS_DEPLOY_ENV_BASE64 is set as a CircleCI project env var
      # (base64-encoded production .env), so the deploy orb skips the SCP to
      # creds.l42.eu entirely and avoids the circular dependency where this
      # service would need itself to be up in order to deploy itself.
      - lucos/deploy-avalon:
          serial-group: << pipeline.project.slug >>/deploy-avalon
          requires:
            - test
            - lucos/build-amd64
          filters:
            branches:
              only:
                - main